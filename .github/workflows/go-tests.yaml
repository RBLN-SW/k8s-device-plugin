name: Golang Code Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-tests:
    name: golang unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout code
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: make test
